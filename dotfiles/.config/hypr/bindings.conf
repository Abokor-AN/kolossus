# Applications
bindd = SUPER, RETURN, Terminal, exec, alacritty
bindd = SUPER ALT, RETURN, Tmux, exec, alacritty -e bash -lc "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, firefox
bindd = SUPER SHIFT, B, Browser, exec, firefox
bindd = SUPER SHIFT, F, File manager, exec, thunar
bindd = SUPER SHIFT, N, Editor, exec, zeditor

# Fenêtres et pavage
bindd = SUPER, W, Close window, killactive,
bindd = SUPER, J, Toggle window split, layoutmsg, togglesplit
bindd = SUPER, P, Pseudo window, pseudo,
bindd = SUPER, T, Toggle floating, togglefloating,
bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1

bindd = SUPER, LEFT, Focus left, movefocus, l
bindd = SUPER, RIGHT, Focus right, movefocus, r
bindd = SUPER, UP, Focus up, movefocus, u
bindd = SUPER, DOWN, Focus down, movefocus, d

# Espaces de travail
bindd = SUPER, code:10, Workspace 1, workspace, 1
bindd = SUPER, code:11, Workspace 2, workspace, 2
bindd = SUPER, code:12, Workspace 3, workspace, 3
bindd = SUPER, code:13, Workspace 4, workspace, 4
bindd = SUPER, code:14, Workspace 5, workspace, 5
bindd = SUPER, code:15, Workspace 6, workspace, 6
bindd = SUPER, code:16, Workspace 7, workspace, 7
bindd = SUPER, code:17, Workspace 8, workspace, 8
bindd = SUPER, code:18, Workspace 9, workspace, 9
bindd = SUPER, code:19, Workspace 10, workspace, 10

bindd = SUPER SHIFT, code:10, Move to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, code:19, Move to workspace 10, movetoworkspace, 10

bindd = SUPER SHIFT ALT, code:10, Move silently to workspace 1, movetoworkspacesilent, 1
bindd = SUPER SHIFT ALT, code:11, Move silently to workspace 2, movetoworkspacesilent, 2
bindd = SUPER SHIFT ALT, code:12, Move silently to workspace 3, movetoworkspacesilent, 3
bindd = SUPER SHIFT ALT, code:13, Move silently to workspace 4, movetoworkspacesilent, 4
bindd = SUPER SHIFT ALT, code:14, Move silently to workspace 5, movetoworkspacesilent, 5
bindd = SUPER SHIFT ALT, code:15, Move silently to workspace 6, movetoworkspacesilent, 6
bindd = SUPER SHIFT ALT, code:16, Move silently to workspace 7, movetoworkspacesilent, 7
bindd = SUPER SHIFT ALT, code:17, Move silently to workspace 8, movetoworkspacesilent, 8
bindd = SUPER SHIFT ALT, code:18, Move silently to workspace 9, movetoworkspacesilent, 9
bindd = SUPER SHIFT ALT, code:19, Move silently to workspace 10, movetoworkspacesilent, 10

bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move to scratchpad, movetoworkspacesilent, special:scratchpad
bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous

# Déplacement et redimensionnement
bindd = SUPER SHIFT, LEFT, Swap left, swapwindow, l
bindd = SUPER SHIFT, RIGHT, Swap right, swapwindow, r
bindd = SUPER SHIFT, UP, Swap up, swapwindow, u
bindd = SUPER SHIFT, DOWN, Swap down, swapwindow, d
bindd = ALT, TAB, Next window, cyclenext
bindd = ALT SHIFT, TAB, Previous window, cyclenext, prev
bindd = ALT, TAB, Reveal active window, bringactivetotop
bindd = ALT SHIFT, TAB, Reveal active window, bringactivetotop
bindd = SUPER, code:20, Expand left, resizeactive, -100 0
bindd = SUPER, code:21, Shrink left, resizeactive, 100 0
bindd = SUPER SHIFT, code:20, Shrink up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand down, resizeactive, 0 100
bindd = SUPER, mouse_down, Next workspace, workspace, e+1
bindd = SUPER, mouse_up, Previous workspace, workspace, e-1
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Groupes
bindd = SUPER, G, Toggle group, togglegroup
bindd = SUPER ALT, G, Leave group, moveoutofgroup
bindd = SUPER ALT, LEFT, Join group left, moveintogroup, l
bindd = SUPER ALT, RIGHT, Join group right, moveintogroup, r
bindd = SUPER ALT, UP, Join group up, moveintogroup, u
bindd = SUPER ALT, DOWN, Join group down, moveintogroup, d
bindd = SUPER ALT, TAB, Next grouped window, changegroupactive, f
bindd = SUPER ALT SHIFT, TAB, Previous grouped window, changegroupactive, b

# Média et luminosité avec SwayOSD
bindeld = , XF86AudioRaiseVolume, Volume up, exec, swayosd-client --output-volume raise
bindeld = , XF86AudioLowerVolume, Volume down, exec, swayosd-client --output-volume lower
bindeld = , XF86AudioMute, Mute output, exec, swayosd-client --output-volume mute-toggle
bindeld = , XF86AudioMicMute, Mute input, exec, swayosd-client --input-volume mute-toggle
bindeld = , XF86MonBrightnessUp, Brightness up, exec, swayosd-client --brightness raise
bindeld = , XF86MonBrightnessDown, Brightness down, exec, swayosd-client --brightness lower
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, swayosd-client --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, swayosd-client --output-volume -1
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, swayosd-client --brightness +1
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, swayosd-client --brightness -1
bindld = , XF86AudioNext, Next track, exec, swayosd-client --playerctl next
bindld = , XF86AudioPause, Pause, exec, swayosd-client --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, swayosd-client --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, swayosd-client --playerctl prev

# Presse-papiers et lanceur
bindd = SUPER, C, Universal copy, sendshortcut, CTRL, Insert, activewindow
bindd = SUPER, V, Universal paste, sendshortcut, SHIFT, Insert, activewindow
bindd = SUPER, X, Universal cut, sendshortcut, CTRL, X, activewindow
bindd = SUPER CTRL, V, Clipboard manager, exec, kolossus-launcher clipboard
bindd = SUPER, SPACE, Launch apps, exec, kolossus-launcher
bindd = SUPER CTRL, E, Emoji picker, exec, kolossus-launcher symbols
bindd = SUPER, ESCAPE, System menu, exec, kolossus-system-menu
bindd = , XF86PowerOff, System menu, exec, kolossus-system-menu

# Apparence et notifications
bindd = SUPER SHIFT, SPACE, Toggle top bar, exec, kolossus-toggle-waybar
bindd = SUPER, COMMA, Dismiss notification, exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all
bindd = SUPER ALT, COMMA, Invoke notification, exec, makoctl invoke
bindd = SUPER SHIFT ALT, COMMA, Restore notification, exec, makoctl restore
bindd = SUPER CTRL, I, Toggle idle locking, exec, kolossus-toggle-idle

# Captures
bindd = , PRINT, Region screenshot, exec, kolossus-capture region
bindd = ALT, PRINT, Window screenshot, exec, kolossus-capture window
bindd = SHIFT, PRINT, Output screenshot, exec, kolossus-capture output
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a

# Panneaux de contrôle
bindd = SUPER CTRL, A, Audio controls, exec, alacritty -e wiremix
bindd = SUPER CTRL, B, Bluetooth controls, exec, alacritty -e bluetui
bindd = SUPER CTRL, W, Wi-Fi controls, exec, kolossus-network
bindd = SUPER CTRL, T, Activity, exec, alacritty -e btop

# Zoom et verrouillage
bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1
bindd = SUPER CTRL, L, Lock system, exec, kolossus-lock

