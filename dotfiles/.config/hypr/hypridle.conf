general {
  lock_cmd = kolossus-lock
  before_sleep_cmd = kolossus-lock
  after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on
  inhibit_sleep = 3
}

# Omarchy verrouille après environ cinq minutes d’inactivité.
listener {
  timeout = 300
  on-timeout = kolossus-lock
  on-resume = hyprctl dispatch dpms on
}

