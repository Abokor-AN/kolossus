$color = rgba(05182eff)
$inner_color = rgba(05182ecc)
$outer_color = rgba(f6dcacff)
$font_color = rgba(f6dcacff)
$check_color = rgba(faa968ff)

general {
  ignore_empty_input = true
}

background {
  monitor =
  color = $color
  path = ~/.config/swaybg/retro-82.jpg
  blur_passes = 3
}

animations {
  enabled = false
}

input-field {
  monitor =
  size = 650, 100
  position = 0, 0
  halign = center
  valign = center
  inner_color = $inner_color
  outer_color = $outer_color
  outline_thickness = 4
  font_family = JetBrainsMono Nerd Font
  font_color = $font_color
  placeholder_text = Enter Password
  check_color = $check_color
  fail_text = <i>$FAIL ($ATTEMPTS)</i>
  rounding = 0
  shadow_passes = 0
  fade_on_empty = false
}

auth {
  fingerprint:enabled = false
}

