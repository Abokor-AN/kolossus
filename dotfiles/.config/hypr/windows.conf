# Syntaxe Hyprland 0.53+.
windowrule = suppress_event maximize, match:class .*
windowrule = tag +default-opacity, match:class .*

# Corrige certaines fenêtres XWayland invisibles utilisées pour le glisser-déposer.
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Firefox et Alacritty conservent une opacité presque complète.
windowrule = tag +firefox-based-browser, match:class ([fF]irefox)
windowrule = tag -default-opacity, match:tag firefox-based-browser
windowrule = opacity 1.0 0.97, match:tag firefox-based-browser

windowrule = tag +terminal, match:class (Alacritty)
windowrule = tag -default-opacity, match:tag terminal
windowrule = opacity 0.97 0.9, match:tag terminal

# Fenêtres de dialogue et outils secondaires.
windowrule = float on, match:class (org.pulseaudio.pavucontrol|nm-connection-editor|blueman-manager|org.gnome.Calculator)
windowrule = center on, match:class (org.pulseaudio.pavucontrol|nm-connection-editor|blueman-manager|org.gnome.Calculator)

# Aucune transparence sur les médias.
windowrule = tag -default-opacity, match:class ^(vlc|mpv|com.obsproject.Studio|imv)$
windowrule = opacity 1 1, match:class ^(vlc|mpv|com.obsproject.Studio|imv)$

# Opacité appliquée aux autres fenêtres après leurs exceptions.
windowrule = opacity 0.97 0.9, match:tag default-opacity

