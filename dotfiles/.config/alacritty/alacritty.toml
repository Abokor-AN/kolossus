[env]
TERM = "xterm-256color"

[terminal]
osc52 = "CopyPaste"

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 9

[window]
padding = { x = 14, y = 14 }
decorations = "None"
opacity = 0.97

[colors.primary]
background = "#05182e"
foreground = "#f6dcac"

[colors.cursor]
text = "#05182e"
cursor = "#f6dcac"

[colors.vi_mode_cursor]
text = "#05182e"
cursor = "#f6dcac"

[colors.search.matches]
foreground = "#05182e"
background = "#e97b3c"

[colors.search.focused_match]
foreground = "#05182e"
background = "#f85525"

[colors.footer_bar]
foreground = "#05182e"
background = "#f6dcac"

[colors.selection]
text = "#00172e"
background = "#faa968"

[colors.normal]
black = "#303442"
red = "#f85525"
green = "#028391"
yellow = "#e97b3c"
blue = "#faa968"
magenta = "#3f8f8a"
cyan = "#8cbfb8"
white = "#a7c9c6"

[colors.bright]
black = "#134e5a"
red = "#f85525"
green = "#028391"
yellow = "#e97b3c"
blue = "#faa968"
magenta = "#3f8f8a"
cyan = "#8cbfb8"
white = "#f6dcac"

[keyboard]
bindings = [
  { key = "Insert", mods = "Shift", action = "Paste" },
  { key = "Insert", mods = "Control", action = "Copy" },
  { key = "Return", mods = "Shift", chars = "\u001B\r" }
]

