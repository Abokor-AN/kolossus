# Ajoute Plymouth sans remplacer les hooks définis par Archinstall ou la machine.
# Ce fichier est sourcé après /etc/mkinitcpio.conf.

_kolossus_hooks=()
_kolossus_plymouth_added=0

for _kolossus_hook in "${HOOKS[@]}"; do
  # Repositionne une éventuelle occurrence existante au bon endroit.
  [[ $_kolossus_hook == plymouth ]] && continue

  if (( !_kolossus_plymouth_added )) &&
    [[ $_kolossus_hook == encrypt || $_kolossus_hook == sd-encrypt ]]; then
    _kolossus_hooks+=(plymouth)
    _kolossus_plymouth_added=1
  fi

  _kolossus_hooks+=("$_kolossus_hook")
done

# Sur un système non chiffré, Plymouth reste utilisable comme splash de boot.
if (( !_kolossus_plymouth_added )); then
  _kolossus_hooks+=(plymouth)
fi

HOOKS=("${_kolossus_hooks[@]}")

unset _kolossus_hook _kolossus_hooks _kolossus_plymouth_added
